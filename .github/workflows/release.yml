name: Windows Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest
      - run: python -m ruff check .
      - run: python -m black --check .
      - run: python scripts/generate_icon.py
      - run: python -m PyInstaller --noconfirm kms_dtf_erp.spec
      - name: Smoke test executable
        shell: powershell
        run: |
          $process = Start-Process ".\dist\KMS_DTF_ERP\KMS_DTF_ERP.exe" -PassThru
          Start-Sleep -Seconds 10
          $process.Refresh()
          if ($process.HasExited) { throw "Executable exited early: $($process.ExitCode)" }
          Stop-Process -Id $process.Id -Force
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
      - name: Build installer
        shell: powershell
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "installer\KMS_DTF_ERP.iss"
      - uses: actions/upload-artifact@v4
        with:
          name: KMS-DTF-ERP-Setup-1.0.0
          path: installer-output/KMS-DTF-ERP-Setup-1.0.0.exe
          if-no-files-found: error
